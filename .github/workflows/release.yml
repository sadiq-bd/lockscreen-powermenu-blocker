name: Release

on:
    push:
        tags:
            - "*"

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Create ZIP
              run: |
                  ZIP_NAME="lockscreen-powermenu-blocker.zip"

                  zip -r "$ZIP_NAME" . \
                    -x ".git/*" \
                    -x ".github/*"

                  echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  files: ${{ env.ZIP_NAME }}
                  generate_release_notes: true
